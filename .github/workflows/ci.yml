name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Full-app build + tests on the primary development platform. Windows runners
  # ship the graphics/system libraries wgpu/winit/rfd need, so no extra setup.
  windows:
    name: Build & test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --workspace --locked
      - name: Test workspace
        run: cargo test --workspace --locked

  # Geometry/parametric engine on Linux. zerocad-core has no GUI dependencies,
  # so it builds and tests cleanly without any system packages — fast coverage
  # of the kernel, STL export, and serialization on a second platform.
  core-linux:
    name: Core engine (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test zerocad-core
        run: cargo test -p zerocad-core --locked

  # Formatting is normalized and required.
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check

  # Clippy remains advisory while geometry-heavy code still has useful but
  # non-blocking suggestions.
  clippy:
    name: Clippy (core, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy (core)
        run: cargo clippy -p zerocad-core --all-targets
